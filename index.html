<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ الفواتير السريع</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; text-align: center; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #25D366; color: white; border: none; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #128C7E; }
    </style>
</head>
<body>

<div class="container">
    <h2>إنشاء فاتورة واتساب</h2>
    
    <input type="text" id="phone" placeholder="رقم الواتساب (مثال: 201000000000)" />
    <hr>
    <input type="text" id="customerName" placeholder="اسم العميل" />
    <input type="text" id="product" placeholder="اسم المنتج/الخدمة" />
    <input type="number" id="price" placeholder="السعر" />
    
    <button onclick="sendInvoice()">إرسال الفاتورة عبر واتساب</button>
</div>

<script>
    function sendInvoice() {
        // جلب البيانات من الحقول
        const phone = document.getElementById('phone').value.trim();
        const customerName = document.getElementById('customerName').value;
        const product = document.getElementById('product').value;
        const price = document.getElementById('price').value;

        if (!phone || !customerName || !product || !price) {
            alert("يرجى ملء جميع الحقول!");
            return;
        }

        // تنسيق نص الرسالة
        const message = `*--- فاتورة جديدة ---*%0A` +
                        `*العميل:* ${customerName}%0A` +
                        `*المنتج:* ${product}%0A` +
                        `*الإجمالي:* ${price} ريال/جنيه%0A` +
                        `*التاريخ:* ${new Date().toLocaleDateString('ar-EG')}`;

        // رابط الواتساب العالمي
        const whatsappURL = `https://wa.me/${phone}?text=${message}`;

        // فتح الرابط في نافذة جديدة
        window.open(whatsappURL, '_blank');
    }
</script>

</body>
</html>
