<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الفواتير السريع</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        
        /* تصميم الفاتورة */
        #invoice-capture { 
            width: 380px; margin: 20px auto; background: white; padding: 20px; border: 1px solid #eee; text-align: right;
        }
        .inv-header { border-bottom: 2px solid #333; margin-bottom: 10px; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 14px; }
        th { background: #f8f8f8; }
        .total-box { margin-top: 15px; background: #333; color: white; padding: 10px; font-weight: bold; }

        .btn { width: 90%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-copy { background-color: #007bff; color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h3>إدخال بيانات المبيعات</h3>
    <input type="text" id="invNum" placeholder="رقم الفاتورة" oninput="draw()">
    <input type="text" id="custName" placeholder="اسم العميل" oninput="draw()">
    <hr>
    <input type="text" id="pName" placeholder="الصنف" oninput="draw()">
    <input type="number" id="pPrice" placeholder="السعر" oninput="draw()">
    <input type="number" id="pQty" placeholder="الكمية" oninput="draw()">
    <input type="text" id="whatsappPhone" placeholder="رقم واتساب المستلم (بدون +)">

    <div id="invoice-capture">
        <div class="inv-header">
            <h2 style="margin:0;">فاتورة مبيعات</h2>
            <p>رقم: <span id="outNum">000</span> | تاريخ: <span id="outDate"></span></p>
        </div>
        <p>العميل: <span id="outCust">---</span></p>
        <table>
            <thead>
                <tr>
                    <th>الصنف</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="outPName">---</td>
                    <td id="outPPrice">0</td>
                    <td id="outPQty">0</td>
                    <td id="outTotal">0</td>
                </tr>
            </tbody>
        </table>
        <div class="total-box">صافي المبلغ: <span id="finalTotal">0</span> ج.م</div>
    </div>

    <button class="btn btn-copy" onclick="copyToClipboard()">1. نسخ الفاتورة كصورة</button>
    <button class="btn btn-whatsapp" onclick="openWa()">2. فتح الواتساب للإرسال</button>
</div>

<script>
    function draw() {
        document.getElementById('outNum').innerText = document.getElementById('invNum').value || '---';
        document.getElementById('outCust').innerText = document.getElementById('custName').value || '---';
        document.getElementById('outPName').innerText = document.getElementById('pName').value || '---';
        
        let p = parseFloat(document.getElementById('pPrice').value) || 0;
        let q = parseFloat(document.getElementById('pQty').value) || 0;
        let total = p * q;

        document.getElementById('outPPrice').innerText = p;
        document.getElementById('outPQty').innerText = q;
        document.getElementById('outTotal').innerText = total;
        document.getElementById('finalTotal').innerText = total;
        document.getElementById('outDate').innerText = new Date().toLocaleDateString('ar-EG');
    }

    async function copyToClipboard() {
        const element = document.getElementById('invoice-capture');
        const canvas = await html2canvas(element);
        canvas.toBlob(async (blob) => {
            try {
                const data = [new ClipboardItem({ "image/png": blob })];
                await navigator.clipboard.write(data);
                alert("تم نسخ الفاتورة! افتح الواتساب واضغط 'لصق' (Paste)");
            } catch (err) {
                alert("عذراً، متصفحك قد لا يدعم النسخ المباشر، جرب متصفح كروم");
            }
        });
    }

    function openWa() {
        let phone = document.getElementById('whatsappPhone').value;
        if(!phone) return alert("ضع رقم الهاتف أولاً");
        window.open(`https://wa.me/${phone}`, '_blank');
    }

    draw();
</script>

</body>
</html>
